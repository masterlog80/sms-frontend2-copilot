<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USB Modem Dashboard</title>

  <!-- Bootstrap 5.3 -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <!-- Bootstrap Icons -->
  <link
    href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    rel="stylesheet"
    crossorigin="anonymous"
  />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ─── Navbar ──────────────────────────────────────────────────────────── -->
<nav class="navbar navbar-expand-lg px-3 py-2 border-bottom">
  <span class="navbar-brand fw-bold fs-5 d-flex align-items-center gap-2">
    <i class="bi bi-broadcast-pin text-primary"></i>
    USB Modem Dashboard
  </span>
  <div class="ms-auto d-flex align-items-center gap-3">
    <!-- connection badge -->
    <span id="connBadge" class="badge rounded-pill bg-secondary">
      <i class="bi bi-circle-fill me-1"></i>Connecting…
    </span>
    <!-- auto-refresh countdown -->
    <span class="text-secondary small d-flex align-items-center gap-1">
      <i class="bi bi-arrow-repeat"></i>
      <span id="countdown">5</span>s
    </span>
    <!-- manual refresh -->
    <button id="btnRefresh" class="btn btn-sm btn-outline-primary d-flex align-items-center gap-1">
      <i class="bi bi-arrow-clockwise"></i> Refresh
    </button>
    <!-- theme toggle -->
    <button id="btnTheme" class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-1" title="Toggle theme">
      <i class="bi bi-moon-stars-fill"></i>
    </button>
  </div>
</nav>

<!-- ─── Main content ─────────────────────────────────────────────────────── -->
<div class="container-fluid py-4 px-4">

  <!-- Last updated -->
  <div class="text-secondary small mb-3">
    Device: <code id="deviceLabel">–</code>
    &nbsp;|&nbsp;
    Last updated: <span id="lastUpdated">–</span>
  </div>

  <!-- Row 1: Signal + Memory cards -->
  <div class="row g-3 mb-3">

    <!-- Signal Strength -->
    <div class="col-12 col-md-6 col-xl-4">
      <div class="card h-100">
        <div class="card-body">
          <h6 class="card-title text-uppercase text-secondary mb-3">
            <i class="bi bi-reception-4 me-1"></i>Signal Strength
          </h6>
          <div class="d-flex align-items-end gap-3 mb-3">
            <span id="sigPercent" class="display-4 fw-bold">–</span>
            <span class="text-secondary mb-1">%</span>
            <span id="sigQuality" class="badge fs-6 mb-1">–</span>
          </div>
          <div class="progress mb-2" style="height:10px">
            <div id="sigBar" class="progress-bar" role="progressbar" style="width:0%"></div>
          </div>
          <div class="row text-center mt-2 small">
            <div class="col">
              <div class="text-secondary">RSSI</div>
              <div id="sigRssi" class="fw-semibold">–</div>
            </div>
            <div class="col">
              <div class="text-secondary">dBm</div>
              <div id="sigDbm" class="fw-semibold">–</div>
            </div>
            <div class="col">
              <div class="text-secondary">BER</div>
              <div id="sigBer" class="fw-semibold">–</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- SMS Memory -->
    <div class="col-12 col-md-6 col-xl-4">
      <div class="card h-100">
        <div class="card-body">
          <h6 class="card-title text-uppercase text-secondary mb-3">
            <i class="bi bi-sd-card me-1"></i>SIM SMS Memory
          </h6>
          <div class="d-flex align-items-end gap-3 mb-3">
            <span id="memUsed" class="display-4 fw-bold">–</span>
            <span class="text-secondary mb-1 fs-5">/ <span id="memTotal">–</span></span>
          </div>
          <div class="progress mb-2" style="height:10px">
            <div id="memBar" class="progress-bar" role="progressbar" style="width:0%"></div>
          </div>
          <div class="row text-center mt-2 small">
            <div class="col">
              <div class="text-secondary">Used</div>
              <div id="memUsed2" class="fw-semibold">–</div>
            </div>
            <div class="col">
              <div class="text-secondary">Free</div>
              <div id="memFree" class="fw-semibold">–</div>
            </div>
            <div class="col">
              <div class="text-secondary">Total</div>
              <div id="memTotal2" class="fw-semibold">–</div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Modem Info -->
    <div class="col-12 col-md-6 col-xl-4">
      <div class="card h-100">
        <div class="card-body">
          <h6 class="card-title text-uppercase text-secondary mb-3">
            <i class="bi bi-router me-1"></i>Modem Info
          </h6>
          <table class="table table-sm table-borderless mb-0 small">
            <tbody>
              <tr>
                <td class="text-secondary">Manufacturer</td>
                <td id="infoManuf" class="fw-semibold">–</td>
              </tr>
              <tr>
                <td class="text-secondary">Model</td>
                <td id="infoModel" class="fw-semibold">–</td>
              </tr>
              <tr>
                <td class="text-secondary">IMEI</td>
                <td id="infoImei" class="fw-semibold">–</td>
              </tr>
              <tr>
                <td class="text-secondary">Network</td>
                <td id="infoNet" class="fw-semibold">–</td>
              </tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <!-- Row 2: SMS Inbox + Event Log -->
  <div class="row g-3">

    <!-- SMS Inbox -->
    <div class="col-12 col-xl-7">
      <div class="card">
        <div class="card-header d-flex align-items-center justify-content-between">
          <span class="fw-semibold">
            <i class="bi bi-envelope me-1"></i>
            SMS Inbox
            <span id="smsBadge" class="badge bg-primary ms-1">0</span>
          </span>
          <button id="btnClearSms" class="btn btn-sm btn-outline-danger d-flex align-items-center gap-1">
            <i class="bi bi-trash3"></i> Clear All
          </button>
        </div>
        <div class="card-body p-0">
          <div id="smsContainer" class="sms-container">
            <div class="text-center text-secondary py-5" id="smsEmpty">
              <i class="bi bi-inbox display-6 d-block mb-2"></i>
              No messages
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Event Log -->
    <div class="col-12 col-xl-5">
      <div class="card">
        <div class="card-header d-flex align-items-center justify-content-between">
          <span class="fw-semibold">
            <i class="bi bi-journal-text me-1"></i>Event Log
          </span>
          <button id="btnClearLog" class="btn btn-sm btn-outline-secondary d-flex align-items-center gap-1">
            <i class="bi bi-x-circle"></i> Clear
          </button>
        </div>
        <div class="card-body p-0">
          <div id="logContainer" class="log-container font-monospace small">
            <div class="text-center text-secondary py-4" id="logEmpty">
              <i class="bi bi-terminal display-6 d-block mb-2"></i>No log entries
            </div>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<!-- Toast notifications -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastArea"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" crossorigin="anonymous"></script>
<script src="app.js"></script>
</body>
</html>
