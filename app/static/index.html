<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>USB Modem Dashboard</title>

  <!-- Bootstrap 5.3 -->
  <link href="bootstrap.min.css" rel="stylesheet" />
  <!-- Bootstrap Icons -->
  <link href="bootstrap-icons/bootstrap-icons.css" rel="stylesheet" />
  <!-- Chart.js -->
  <script src="chart.umd.min.js"></script>
  <script src="chartjs-adapter-date-fns.bundle.min.js"></script>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════════
     TOP NAV
════════════════════════════════════════════════════════════════════════ -->
<header class="dash-header">
  <div class="dash-header-inner">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">
        <i class="bi bi-broadcast-pin"></i>
      </div>
      <div>
        <div class="brand-title">USB Modem Dashboard</div>
        <div class="brand-sub">
          <code id="deviceLabel">–</code>
        </div>
      </div>
    </div>

    <!-- Right controls -->
    <div class="header-controls">
      <!-- Status pill -->
      <div id="connBadge" class="status-pill status-unknown">
        <span class="status-dot"></span>
        <span class="status-label">Connecting…</span>
      </div>

      <!-- Refresh ring -->
      <div class="refresh-ring" title="Auto-refresh">
        <svg viewBox="0 0 36 36" class="ring-svg">
          <circle class="ring-bg" cx="18" cy="18" r="15"/>
          <circle id="ringProgress" class="ring-fg" cx="18" cy="18" r="15"
                  stroke-dasharray="94.25 94.25" stroke-dashoffset="0"/>
        </svg>
        <span id="countdown" class="ring-label">5</span>
      </div>

      <!-- Manual refresh -->
      <button id="btnRefresh" class="icon-btn" title="Refresh now">
        <i class="bi bi-arrow-clockwise"></i>
      </button>

      <!-- Theme toggle -->
      <button id="btnTheme" class="icon-btn" title="Toggle theme">
        <i class="bi bi-moon-stars-fill"></i>
      </button>

      <!-- Last updated -->
      <div class="last-updated text-secondary small d-none d-lg-block">
        Updated <span id="lastUpdated">–</span>
      </div>
    </div>
  </div>
</header>

<!-- ═══════════════════════════════════════════════════════════════════════
     STAT CARDS ROW  (always visible above tabs)
════════════════════════════════════════════════════════════════════════ -->
<div class="stats-bar">
  <div class="stats-grid">

    <!-- Signal Strength -->
    <div class="stat-card stat-card--signal">
      <div class="stat-card-label">
        <i class="bi bi-reception-4"></i> Signal Strength
      </div>
      <div class="stat-card-body">
        <!-- SVG arc gauge -->
        <div class="gauge-wrap">
          <svg class="gauge-svg" viewBox="0 0 120 70">
            <path class="gauge-track" d="M10,65 A50,50 0 0,1 110,65"/>
            <path id="gaugeSig" class="gauge-fill gauge-fill--sig" d="M10,65 A50,50 0 0,1 110,65"
                  stroke-dasharray="157 157" stroke-dashoffset="157"/>
          </svg>
          <div class="gauge-center">
            <span id="sigPercent" class="gauge-value">–</span>
            <span class="gauge-unit">%</span>
          </div>
        </div>
        <span id="sigQuality" class="quality-badge quality-unknown">–</span>
      </div>
      <div class="stat-card-footer">
        <div class="stat-kv"><span>RSSI</span><strong id="sigRssi">–</strong></div>
        <div class="stat-divider"></div>
        <div class="stat-kv"><span>dBm</span><strong id="sigDbm">–</strong></div>
        <div class="stat-divider"></div>
        <div class="stat-kv"><span>BER</span><strong id="sigBer">–</strong></div>
      </div>
    </div>

    <!-- SIM Memory -->
    <div class="stat-card stat-card--mem">
      <div class="stat-card-label">
        <i class="bi bi-sim"></i> SIM SMS Memory
      </div>
      <div class="stat-card-body stat-card-body--mem">
        <div class="mem-big">
          <span id="memUsed" class="mem-num">–</span>
          <span class="mem-sep">/ <span id="memTotal">–</span></span>
        </div>
        <div class="mem-bar-wrap">
          <div class="mem-bar-track">
            <div id="memBar" class="mem-bar-fill" style="width:0%"></div>
          </div>
          <span id="memPctLabel" class="mem-pct">0%</span>
        </div>
      </div>
      <div class="stat-card-footer">
        <div class="stat-kv"><span>Used</span><strong id="memUsed2">–</strong></div>
        <div class="stat-divider"></div>
        <div class="stat-kv"><span>Free</span><strong id="memFree">–</strong></div>
        <div class="stat-divider"></div>
        <div class="stat-kv"><span>Total</span><strong id="memTotal2">–</strong></div>
      </div>
    </div>

    <!-- Modem Info -->
    <div class="stat-card stat-card--info">
      <div class="stat-card-label">
        <i class="bi bi-router"></i> Modem Info
      </div>
      <div class="stat-card-body stat-card-body--info">
        <dl class="info-dl">
          <dt>Manufacturer</dt><dd id="infoManuf">–</dd>
          <dt>Model</dt>       <dd id="infoModel">–</dd>
          <dt>IMEI</dt>        <dd id="infoImei" class="font-monospace small">–</dd>
          <dt>Network</dt>     <dd id="infoNet">–</dd>
        </dl>
      </div>
    </div>

  </div><!-- /stats-grid -->
</div><!-- /stats-bar -->

<!-- ═══════════════════════════════════════════════════════════════════════
     MAIN TABBED CONTENT
════════════════════════════════════════════════════════════════════════ -->
<div class="main-content">

  <!-- Tab navigation (pill style) -->
  <ul class="dash-tabs nav" role="tablist">
    <li class="nav-item" role="presentation">
      <button class="dash-tab-btn active" id="tab-sms"
              data-bs-toggle="tab" data-bs-target="#pane-sms"
              type="button" role="tab">
        <i class="bi bi-envelope"></i>
        <span>SMS Inbox</span>
        <span id="smsBadge" class="tab-badge">0</span>
      </button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="dash-tab-btn" id="tab-signal"
              data-bs-toggle="tab" data-bs-target="#pane-signal"
              type="button" role="tab">
        <i class="bi bi-activity"></i>
        <span>Signal Strength</span>
      </button>
    </li>
    <li class="nav-item" role="presentation">
      <button class="dash-tab-btn" id="tab-log"
              data-bs-toggle="tab" data-bs-target="#pane-log"
              type="button" role="tab">
        <i class="bi bi-terminal"></i>
        <span>Event Log</span>
        <span id="logBadge" class="tab-badge tab-badge--warn d-none">!</span>
      </button>
    </li>
  </ul>

  <!-- Tab panes -->
  <div class="tab-content dash-tab-content">

    <!-- ── SMS Inbox ─────────────────────────────────────────────────── -->
    <div class="tab-pane fade show active" id="pane-sms" role="tabpanel">
      <div class="panel">
        <div class="panel-hdr">
          <span><i class="bi bi-envelope me-2"></i>SMS Inbox</span>
          <button id="btnClearSms" class="btn btn-sm btn-danger-ghost d-flex align-items-center gap-1">
            <i class="bi bi-trash3"></i> Clear All
          </button>
        </div>
        <div id="smsContainer" class="sms-container panel-body-flush">
          <div class="empty-state py-5" id="smsEmpty">
            <i class="bi bi-inbox display-5"></i>
            <p>No messages in inbox</p>
          </div>
        </div>
      </div>
    </div><!-- /pane-sms -->

    <!-- ── Signal Strength History ───────────────────────────────────── -->
    <div class="tab-pane fade" id="pane-signal" role="tabpanel">
      <div class="panel">
        <div class="panel-hdr">
          <span><i class="bi bi-activity me-2"></i>Signal Strength History</span>
          <div class="signal-range-group" id="signalRanges">
            <button class="lf-btn active" data-minutes="10">10 min</button>
            <button class="lf-btn" data-minutes="60">1 hour</button>
            <button class="lf-btn" data-minutes="360">6 hours</button>
            <button class="lf-btn" data-minutes="1440">24 hours</button>
          </div>
        </div>
        <div class="signal-chart-wrap">
          <canvas id="signalChart"></canvas>
        </div>
      </div>
    </div><!-- /pane-signal -->

    <!-- ── Event Log ─────────────────────────────────────────────────── -->
    <div class="tab-pane fade" id="pane-log" role="tabpanel">
      <div class="panel">
        <div class="panel-hdr">
          <span><i class="bi bi-terminal me-2"></i>Event Log</span>
          <div class="d-flex align-items-center gap-2">
            <!-- filter pills -->
            <div class="log-filter-group" id="logFilters">
              <button class="lf-btn active" data-level="ALL">All</button>
              <button class="lf-btn" data-level="INFO">Info</button>
              <button class="lf-btn" data-level="WARNING">Warn</button>
              <button class="lf-btn" data-level="ERROR">Error</button>
            </div>
            <button id="btnClearLog" class="btn btn-sm btn-ghost d-flex align-items-center gap-1">
              <i class="bi bi-x-circle"></i> Clear
            </button>
          </div>
        </div>
        <div id="logContainer" class="log-container panel-body-flush font-monospace small">
          <div class="empty-state py-5" id="logEmpty">
            <i class="bi bi-terminal display-5"></i>
            <p>No log entries</p>
          </div>
        </div>
      </div>
    </div><!-- /pane-log -->

  </div><!-- /tab-content -->
</div><!-- /main-content -->

<!-- Toast notifications -->
<div class="toast-container position-fixed bottom-0 end-0 p-3" id="toastArea"></div>

<script src="bootstrap.bundle.min.js"></script>
<script src="app.js"></script>
</body>
</html>
